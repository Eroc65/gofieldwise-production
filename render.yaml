# Render deployment configuration for FrontDesk Pro

services:
  - type: web
    name: fieldwise-web
    env: node
    plan: free
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm run start -- -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
  - type: web
    name: backend
    env: python
    plan: free
    buildFilter:
      paths:
        - backend/**
        - alembic/**
        - alembic.ini
        - render.yaml
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
