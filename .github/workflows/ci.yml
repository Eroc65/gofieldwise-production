name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run frontend e2e smoke
        run: npm run test:e2e

  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run migrations (SQLite smoke)
        run: python -m alembic upgrade head
      - name: Run Python tests
        run: pytest -q

  backend-schedule-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Reset local SQLite file
        run: rm -f test.db
      - name: Start backend API
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > uvicorn.log 2>&1 &
          sleep 3
      - name: Run schedule readiness smoke script
        run: python scripts/smoke_schedule_readiness.py
