name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        run: npm run build
      - name: Run frontend e2e smoke
        run: npm run test:e2e
      - name: Run lead inbox e2e smoke
        run: npx playwright test tests/leads-inbox.spec.js
      - name: Run metrics e2e smoke
        run: npx playwright test tests/metrics.spec.js

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run migrations (SQLite smoke)
        run: python -m alembic upgrade head
      - name: Run dispatch flow integration test (fast gate)
        run: pytest -q tests/test_dispatch_flow_integration.py
      - name: Run lifecycle quick-actions test (fast gate)
        run: pytest -q tests/test_dispatch.py -k lifecycle_quick_actions_require_valid_order
      - name: Run lead conversion metrics fast gate
        run: pytest -q tests/test_reports.py -k lead_conversion_metrics_daily_series
      - name: Run collections regression fast gate
        run: pytest -q tests/test_payment_escalation.py tests/test_invoices.py
      - name: Run Python tests
        run: pytest -q

  backend-lifecycle-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run lifecycle integration smoke
        run: pytest -q tests/test_dispatch_flow_integration.py -k conflict_next_slot_then_dispatch

  backend-schedule-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Reset local SQLite file
        run: rm -f test.db
      - name: Start backend API
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > uvicorn.log 2>&1 &
          sleep 3
      - name: Run schedule readiness smoke script
        run: python scripts/smoke_schedule_readiness.py

  backend-collections-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Reset local SQLite file
        run: rm -f test.db
      - name: Start backend API
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > uvicorn.log 2>&1 &
          sleep 3
      - name: Run collections readiness smoke script
        run: python scripts/smoke_collections_readiness.py
