name: Post Deploy Smoke

on:
  workflow_run:
    workflows: ["Deploy Staging", "Deploy Production"]
    types: [completed]

jobs:
  smoke:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure target environment
        id: smoke_env
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL || vars.STAGING_API_BASE_URL }}
          STAGING_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL || vars.STAGING_SMOKE_EMAIL }}
          STAGING_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD || vars.STAGING_SMOKE_PASSWORD }}
          PRODUCTION_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL || vars.PRODUCTION_API_BASE_URL }}
          PRODUCTION_SMOKE_EMAIL: ${{ secrets.PRODUCTION_SMOKE_EMAIL || vars.PRODUCTION_SMOKE_EMAIL }}
          PRODUCTION_SMOKE_PASSWORD: ${{ secrets.PRODUCTION_SMOKE_PASSWORD || vars.PRODUCTION_SMOKE_PASSWORD }}
        run: |
          if [ "${{ github.event.workflow_run.name }}" = "Deploy Staging" ]; then
            SMOKE_API_BASE_URL="$STAGING_API_BASE_URL"
            SMOKE_EMAIL="$STAGING_SMOKE_EMAIL"
            SMOKE_PASSWORD="$STAGING_SMOKE_PASSWORD"
            TARGET_ENV="staging"
            TARGET_PREFIX="STAGING"
          else
            SMOKE_API_BASE_URL="$PRODUCTION_API_BASE_URL"
            SMOKE_EMAIL="$PRODUCTION_SMOKE_EMAIL"
            SMOKE_PASSWORD="$PRODUCTION_SMOKE_PASSWORD"
            TARGET_ENV="production"
            TARGET_PREFIX="PRODUCTION"
          fi

          if [ -z "$SMOKE_API_BASE_URL" ] || [ -z "$SMOKE_EMAIL" ] || [ -z "$SMOKE_PASSWORD" ]; then
            echo "::warning::Post-deploy smoke skipped for $TARGET_ENV because required smoke credentials are missing. Configure ${TARGET_PREFIX}_API_BASE_URL, ${TARGET_PREFIX}_SMOKE_EMAIL, and ${TARGET_PREFIX}_SMOKE_PASSWORD as repository secrets or variables."
            echo "smoke_action=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "SMOKE_API_BASE_URL=$SMOKE_API_BASE_URL" >> "$GITHUB_ENV"
          echo "SMOKE_EMAIL=$SMOKE_EMAIL" >> "$GITHUB_ENV"
          echo "SMOKE_PASSWORD=$SMOKE_PASSWORD" >> "$GITHUB_ENV"
          echo "smoke_action=run" >> "$GITHUB_OUTPUT"

      - name: Run release smoke checks
        if: steps.smoke_env.outputs.smoke_action == 'run'
        run: python scripts/smoke_deploy_release.py
