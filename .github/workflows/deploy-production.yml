name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Validate production deploy hook secrets
        run: |
          FRONTEND_HOOK="${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"
          BACKEND_HOOK="${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

          if [ -z "$FRONTEND_HOOK" ]; then
            echo "Missing secret: RENDER_FRONTEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          if [[ ! "$FRONTEND_HOOK" =~ ^https://api\.render\.com/deploy/srv-[A-Za-z0-9]+\?key=[A-Za-z0-9]+$ ]]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK_URL must be a valid Render deploy hook URL"
            exit 1
          fi

          if [ -z "$BACKEND_HOOK" ]; then
            echo "Missing secret: RENDER_BACKEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          if [[ ! "$BACKEND_HOOK" =~ ^https://api\.render\.com/deploy/srv-[A-Za-z0-9]+\?key=[A-Za-z0-9]+$ ]]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL must be a valid Render deploy hook URL"
            exit 1
          fi

      - name: Trigger frontend production deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"

      - name: Trigger backend production deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"
