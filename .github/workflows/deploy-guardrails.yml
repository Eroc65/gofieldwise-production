name: Deploy Guardrails

on:
  workflow_run:
    workflows: ["Deploy Staging", "Deploy Production", "Post Deploy Smoke"]
    types: [completed]

jobs:
  alert-on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out' || github.event.workflow_run.conclusion == 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = `[Deploy Guardrail] ${run.name} ${run.conclusion}`;
            const body = [
              "Deployment workflow guardrail detected a non-success conclusion.",
              "",
              `Workflow: ${run.name}`,
              `Conclusion: ${run.conclusion}`,
              `Branch: ${run.head_branch}`,
              `Commit: ${run.head_sha}`,
              `Run URL: ${run.html_url}`,
              "",
              "Action: Investigate immediately before next promotion.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["deployment", "incident"],
            });
