<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-GPT · Startup Operations</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height on supported browsers */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 18px 24px 12px;
      border-bottom: 1px solid #2a2a3a;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #d0d0e8;
    }
    header span { color: #6e6ef8; }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      align-self: flex-end;
      background: #3a3af0;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: #1e1e2e;
      color: #d8d8f0;
      border-bottom-left-radius: 4px;
      border: 1px solid #2e2e44;
    }
    .bubble.system {
      align-self: center;
      background: transparent;
      color: #555570;
      font-size: 0.8rem;
      border: none;
      padding: 0;
    }
    .bubble.thinking {
      align-self: flex-start;
      background: #1e1e2e;
      border: 1px solid #2e2e44;
      color: #6060a0;
      font-style: italic;
      border-bottom-left-radius: 4px;
    }

    #input-area {
      width: 100%;
      max-width: 760px;
      padding: 16px 24px 28px;
      border-top: 1px solid #2a2a3a;
    }
    #input-row {
      display: flex;
      gap: 10px;
    }
    #message-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #35354a;
      border-radius: 10px;
      color: #e0e0f0;
      padding: 10px 14px;
      font-size: 0.93rem;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #message-input:focus { border-color: #5555d0; }
    #message-input::placeholder { color: #555570; }

    #send-btn {
      background: #3a3af0;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.2s;
    }
    #send-btn:hover { background: #4848ff; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #status-bar {
      font-size: 0.72rem;
      color: #444460;
      margin-top: 8px;
      height: 14px;
    }
    #status-bar.connected { color: #44a060; }
    #status-bar.error     { color: #c04040; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 <span>Auto-GPT</span> Startup Operations</h1>
  </header>

  <div id="chat-window">
    <div class="bubble system">Session starting…</div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="message-input" rows="1"
                placeholder="Ask me to build an app, tweet something, run a Meta ad…"></textarea>
      <button id="send-btn" title="Send (Enter)">&#9658;</button>
    </div>
    <div id="status-bar">Connecting…</div>
  </div>

  <script>
    // ------------------------------------------------------------------ //
    // Helpers
    // ------------------------------------------------------------------ //
    // Generate a UUID v4 using the Web Crypto API for uniqueness and security.
    function generateId() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
    }

    // Persist session across page refreshes
    let sessionId = sessionStorage.getItem("autogpt_session_id");
    if (!sessionId) {
      sessionId = generateId();
      sessionStorage.setItem("autogpt_session_id", sessionId);
    }

    const chatWindow  = document.getElementById("chat-window");
    const input       = document.getElementById("message-input");
    const sendBtn     = document.getElementById("send-btn");
    const statusBar   = document.getElementById("status-bar");

    // ------------------------------------------------------------------ //
    // Chat window helpers
    // ------------------------------------------------------------------ //
    function appendBubble(text, role) {
      const el = document.createElement("div");
      el.className = "bubble " + role;
      el.textContent = text;
      chatWindow.appendChild(el);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return el;
    }

    function removeThinking() {
      const t = chatWindow.querySelector(".thinking");
      if (t) t.remove();
    }

    // ------------------------------------------------------------------ //
    // WebSocket
    // ------------------------------------------------------------------ //
    const wsUrl = (location.protocol === "https:" ? "wss" : "ws") +
                  "://" + location.host + "/ws/" + sessionId;
    let ws = null;
    let reconnectDelay = 1000;

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        reconnectDelay = 1000;
        statusBar.textContent = "Connected · session " + sessionId.slice(0, 8) + "…";
        statusBar.className = "connected";
        sendBtn.disabled = false;
      };

      ws.onmessage = (event) => {
        removeThinking();
        appendBubble(event.data, "assistant");
        sendBtn.disabled = false;
        input.focus();
      };

      ws.onclose = () => {
        statusBar.textContent = "Disconnected — reconnecting in " + (reconnectDelay / 1000) + "s…";
        statusBar.className = "error";
        sendBtn.disabled = true;
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 16000);
      };

      ws.onerror = () => {
        statusBar.textContent = "Connection error";
        statusBar.className = "error";
      };
    }

    connect();

    // ------------------------------------------------------------------ //
    // Send message
    // ------------------------------------------------------------------ //
    function send() {
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      appendBubble(text, "user");
      appendBubble("Thinking…", "thinking");
      ws.send(text);
      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;
    }

    sendBtn.addEventListener("click", send);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Auto-grow textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    });
  </script>
</body>
</html>
